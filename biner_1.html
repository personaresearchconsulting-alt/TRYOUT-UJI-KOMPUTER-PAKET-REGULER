    function shuffleOptions() {
        questions.forEach(q => {
            const correctText = q.o[q.a.charCodeAt(0) - 97];
            q.o.sort(() => Math.random() - 0.5);
            q.a = String.fromCharCode(97 + q.o.indexOf(correctText));
        });
    }

    let currentIdx = 0;
    const expiredDate = "2028-07-01";

    function startQuiz() {
        const today = new Date().toISOString().split('T')[0];
        if (today > expiredDate) { alert("Masa berlaku link telah berakhir."); return; }
        const name = document.getElementById('userNameInput').value.trim();
        if (!name) { alert("Masukkan Nama Lengkap!"); return; }
        pesertaName = name;
        document.getElementById('login-overlay').style.display = 'none';
        
        shuffleOptions();
        initQuiz();
    }

    function initQuiz() {
        const container = document.getElementById('soalContainer');
        const grid = document.getElementById('gridNav');
        container.innerHTML = "";
        grid.innerHTML = "";
        questions.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'q-wrapper';
            div.id = `q${i}`;
            let opts = s.o.map((opt, idx) => {
                const char = String.fromCharCode(97 + idx);
                return `<label><input type="radio" name="ans${i}" value="${char}" onchange="hAns(${i})"> ${char.toUpperCase()}. ${opt}</label>`;
            }).join('');
            div.innerHTML = `<div class="q-text">${i+1}. ${s.q}</div><div class="options">${opts}</div>`;
            container.appendChild(div);

            const btn = document.createElement('button');
            btn.id = `nav${i}`; btn.innerText = i + 1;
            btn.onclick = () => jump(i);
            grid.appendChild(btn);
        });
        showSoal(0);
    }

    function hAns(idx) {
        document.getElementById(`nav${idx}`).classList.add('done');
        if (currentIdx < questions.length - 1) setTimeout(() => { move(1); }, 400);
    }

    function showSoal(idx) {
        document.querySelectorAll('.q-wrapper').forEach(el => el.classList.remove('active'));
        const target = document.getElementById(`q${idx}`);
        if(target) target.classList.add('active');
        
        document.querySelectorAll('.nav-grid button').forEach(el => el.classList.remove('current'));
        const navBtn = document.getElementById(`nav${idx}`);
        if(navBtn) navBtn.classList.add('current');
        
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').innerText = (idx === questions.length - 1) ? "SELESAI" : "LANJUT";
        currentIdx = idx;
    }

    function move(step) {
        if (currentIdx === questions.length - 1 && step === 1) { finishQuiz(); return; }
        showSoal(currentIdx + step);
    }

    function jump(idx) { showSoal(idx); }

    function finishQuiz() {
        if (!confirm("Akhiri simulasi sekarang?")) return;
        let sc = 0;
        const b = document.getElementById('rekapBody');
        b.innerHTML = "";
        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const u = sel ? sel.value : null;
            const isC = (u === s.a); if (isC) sc++;
            const uT = u ? s.o[u.charCodeAt(0) - 97] : "-";
            const cT = s.o[s.a.charCodeAt(0) - 97];
            const r = b.insertRow();
            r.innerHTML = `<td>${i+1}</td><td><strong>KASUS:</strong> ${s.q}<br><small>Jawaban Anda: (${u?u.toUpperCase():'-'}) ${uT} | Kunci: (${s.a.toUpperCase()}) ${cT}<br><em>Analisis: ${s.exp}</em></small></td><td class="${isC?'status-benar':'status-salah'}">${isC?'BENAR':'SALAH'}</td>`;
        });
        const fS = (sc / questions.length) * 100;
        document.getElementById('scoreText').innerText = fS.toFixed(0);
        document.getElementById('displayUserName').innerText = pesertaName.toUpperCase();
        document.getElementById('soalContainer').style.display = 'none';
        document.getElementById('navFooter').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0,0);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("HASIL SIMULASI CAT - BINER 1", 10, 15);
        doc.text("Nama Peserta: " + pesertaName.toUpperCase() + " | Skor Akhir: " + document.getElementById('scoreText').innerText, 10, 25);
        const rs = [];
        questions.forEach((s, i) => {
            const sel = document.querySelector(`input[name="ans${i}"]:checked`);
            const isC = (sel && sel.value === s.a);
            rs.push([i+1, s.q.substring(0, 50) + "...", isC ? "BENAR" : "SALAH"]);
        });
        doc.autoTable({ startY: 35, head: [['No', 'Studi Kasus', 'Status']], body: rs });
        doc.save(`Hasil_CAT_Biner_${pesertaName}.pdf`);
    }
</script>
